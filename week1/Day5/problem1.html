<!DOCTYPE html>
<html>
<head>
    <title>Greeting Generator</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5a67d8;
        }

        p {
            margin-top: 20px;
            font-weight: bold;
            color: #444;
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Greeting Generator</h2>

        <input type="text" id="userName" placeholder="Enter your name">

        <br><br>

        <button onclick="generateGreeting()">Generate Greeting</button>

        <p id="greetingMessage"></p>
    </div>

    <script>
        function generateGreeting() {
            var name = document.getElementById("userName").value;
            var greeting = "Hello, " + name + "! Welcome to our website.";
            document.getElementById("greetingMessage").innerHTML = greeting;
        }
    </script>

</body>
</html>
