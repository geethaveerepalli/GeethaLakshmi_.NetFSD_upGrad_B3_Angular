<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Manager</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 60px;
        }

        .card {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
        }

        button {
            padding: 6px 12px;
            margin-top: 10px;
            cursor: pointer;
        }

        input {
            padding: 5px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h3>Student Profile</h3>

        <div id="profileDisplay"></div>

        <input type="number" id="newMarks" placeholder="Enter New Marks">
        <br>
        <button id="updateBtn">Update Marks</button>
    </div>

    <script>
        var student = {
            name: "Geetha",
            rollNo: 101,
            marks: 85
        };

        function updateStudentProfile(studentObj) {

            var profileHTML =
                "<p><strong>Name:</strong> " + studentObj.name + "</p>" +
                "<p><strong>Roll No:</strong> " + studentObj.rollNo + "</p>" +
                "<p><strong>Marks:</strong> " + studentObj.marks + "</p>";

            document.getElementById("profileDisplay").innerHTML = profileHTML;
        }


        function updateMarks(newMarks) {

            student.marks = newMarks;  
            updateStudentProfile(student);
        }

        document.getElementById("updateBtn")
                .addEventListener("click", function() {

                    var marksValue = document.getElementById("newMarks").value;
                    updateMarks(Number(marksValue));

                });

        updateStudentProfile(student);

    </script>

</body>
</html>
