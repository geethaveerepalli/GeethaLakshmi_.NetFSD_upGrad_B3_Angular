<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="problem1.css">
</head>
<body>

    <header>
        <h1>Welcome to Training Portal</h1>
        <p>Learn Web Development with us!</p>
    </header>

    <section class="info-section">
        <h2>About the Course</h2>
        <p>This course covers HTML, CSS, and JavaScript fundamentals.</p>
    </section>

    <div class="box-model-demo">
        This div demonstrates margin and padding.
    </div>

    <section class="form-section">
        <h2>Register Now</h2>
        <form action="form" method="post"> 
            <fieldset>
                <legend>Registration Form</legend>
            <label>Name:</label>
            <input type="text" placeholder="Enter your name" required><br><br>
            <lable>Email:</lable>
            <input type="email" placeholder="Enter your email" required><br><br>
            <label>password:</label>
            <input type="password" placeholder="Enter password" required><br><br>
            <label>Gender:</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <br><br>
            <label>Select Course:</label>
            <select required>
                <option value="">Choose Course</option>
                <option>Web Development</option>
                <option>Python</option>
                <option>Data Science</option>
            </select>
            <br><br>

            <button type="submit">Submit</button>
            </fieldset>
        </form>
    </section>

</body>
</html>
