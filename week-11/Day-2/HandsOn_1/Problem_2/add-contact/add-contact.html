<h2>Add Contact</h2>

<form (ngSubmit)="addContact()">
  <input type="number" [(ngModel)]="contact.id" name="id" placeholder="ID"><br><br>
  <input type="text" [(ngModel)]="contact.name" name="name" placeholder="Name"><br><br>
  <input type="email" [(ngModel)]="contact.email" name="email" placeholder="Email"><br><br>
  <input type="text" [(ngModel)]="contact.phone" name="phone" placeholder="Phone"><br><br>

  <button type="submit">Add Contact</button>
</form>
