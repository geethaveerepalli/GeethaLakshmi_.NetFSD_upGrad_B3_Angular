<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Discount Calculator</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            padding: 30px;
            width: 350px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        input {
            padding: 8px;
            width: 80%;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2ecc71;
        }

        .final {
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Discount Calculator</h1>
        <input type="number" id="amount" placeholder="Enter Purchase Amount">
        <br>
        <button onclick="calculateDiscount()">Calculate</button>

        <p id="purchase"></p>
        <p id="discount"></p>
        <p id="final" class="final"></p>
    </div>

    <script>
        function calculateDiscount() {

            let amount = Number(document.getElementById("amount").value);
            let discount = 0;
            let finalAmount = 0;

            if (isNaN(amount) || amount <= 0) {
                alert("Please enter a valid amount");
                return;
            }

            if (amount >= 5000) {
                discount = amount * 0.20;
            }
            else if (amount >= 3000) {
                discount = amount * 0.10;
            }
            else {
                discount = 0;
            }

            finalAmount = amount - discount;

            document.getElementById("purchase").innerHTML =
                "Purchase Amount: ₹" + amount;

            document.getElementById("discount").innerHTML =
                "Discount Amount: ₹" + discount;

            document.getElementById("final").innerHTML =
                "Final Payable Amount: ₹" + finalAmount;

            console.log("Amount:", amount);
            console.log("Discount:", discount);
            console.log("Final Amount:", finalAmount);
        }
    </script>

</body>
</html>
