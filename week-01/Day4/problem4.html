<!DOCTYPE html>
<html>
<head>
    <title>Traffic Signal Simulator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background-color: white;
            width: 350px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            width: 80%;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            padding: 8px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>

</head>
<body>

    <div class="box">
        <h2>Traffic Signal Simulator</h2>

        <input type="text" id="signalInput" placeholder="Enter red, yellow, green">
        <br>
        <button onclick="checkSignal()">Check</button>

        <div id="output" class="result"></div>
    </div>

    <script>

        function checkSignal() {

            let signal = document.getElementById("signalInput").value.toLowerCase();
            let message = "";
            let output = document.getElementById("output");

            switch (signal) {

                case "red":
                    message = "Stop";
                    output.style.color = "red";
                    break;

                case "yellow":
                    message = "Get Ready";
                    output.style.color = "orange";
                    break;

                case "green":
                    message = "Go";
                    output.style.color = "green";
                    break;

                default:
                    message = "Invalid signal color";
                    output.style.color = "gray";
            }

            console.log(message);
            output.innerHTML = message;
        }

    </script>

</body>
</html>
