<!DOCTYPE html>
<html>
<head>
    <title>Product Cart Counter</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial;
            padding: 30px;
        }

        .cart{
            font-size: 20px;
            margin-bottom: 20px;
        }

        .product{
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }

        .message{
            color: green;
            margin-left: 10px;
        }
    </style>
</head>

<body>

<h2>Shopping Cart</h2>

<div class="cart">
    Cart Items: <span id="cartCount">0</span>
</div>

<div id="productList">

    <div class="product">
        <h4>Product 1</h4>
        <p>Price: 500</p>
        <button class="addBtn" data-name="Product 1">Add to Cart</button>
        <span class="message"></span>
    </div>

    <div class="product">
        <h4>Product 2</h4>
        <p>Price: 800</p>
        <button class="addBtn" data-name="Product 2">Add to Cart</button>
        <span class="message"></span>
    </div>

    <div class="product">
        <h4>Product 3</h4>
        <p>Price: 1200</p>
        <button class="addBtn" data-name="Product 3">Add to Cart</button>
        <span class="message"></span>
    </div>

    <div class="product">
        <h4>Product 4</h4>
        <p>Price: 1500</p>
        <button class="addBtn" data-name="Product 4">Add to Cart</button>
        <span class="message"></span>
    </div>

</div>

<script>
$(document).ready(function(){

    let count = 0;

    $(".addBtn").click(function(){

        count++;

        $("#cartCount").text(count);

        $(this).prop("disabled", true);
        $(this).text("Added");
        $(this).attr("title", "Product already added");

        $(this).siblings(".message").text(" Added to cart");

    });

});
</script>

</body>
</html>
