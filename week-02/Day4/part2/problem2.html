<!DOCTYPE html>
<html>
<head>
    <title>Electronics Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <h2 class="text-center mb-4">Electronics Store</h2>

    <div class="row g-4">

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
                <img src="img3.jpg" class="card-img-top" alt="Product">
                <div class="card-body text-center">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text">$500</p>
                    <button class="btn btn-primary">Add to Cart</button>
                    <button class="btn btn-outline-secondary">View Details</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 ">
                 <img src="img2.avif" class="card-img-top" alt="Product">
                <div class="card-body text-center">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">$900</p>
                    <button class="btn btn-primary btn-sm">Add to Cart</button>
                    <button class="btn btn-outline-secondary">View Details</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 ">
                 <img src="img4.webp" class="card-img-top" alt="Product">
                <div class="card-body text-center">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text">$150</p>
                    <button class="btn btn-primary">Add to Cart</button>
                    <button class="btn btn-outline-secondary">View Details</button>
                </div>
            </div>
        </div>


        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
                 <img src="img5.webp" class="card-img-top" alt="Product">
                <div class="card-body text-center">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text">$250</p>
                    <button class="btn btn-primary ">Add to Cart</button>
                    <button class="btn btn-outline-secondary">View Details</button>
                </div>
            </div>
        </div>

    </div>
</div>
<section class="bg-dark text-white py-4 text-center">
    <div class="container">
        <p>Email: geetha@email.com</p>
        <p>Phone: +91 9876543210</p>
        <button class="btn btn-light">Contact Me</button>
    </div>
</section>

</body>
</html>
