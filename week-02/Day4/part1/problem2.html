<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Management System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f4f8;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        #output {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .card {
            background-color: white;
            padding: 20px;
            width: 260px;
            border-radius: 10px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
            text-align: left;
            line-height: 1.6;
        }

        .brand {
            font-weight: bold;
            font-size: 18px;
            color: #34495e;
        }

        .fuel {
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Vehicle Details</h1>
<div id="output"></div>

<script>
class Vehicle {
    constructor(brand, speed) {
        this.brand = brand;
        this.speed = speed;
    }

    displayInfo() {
        return "<div class='brand'>Brand: " + this.brand + "</div>" +
               "Speed: " + this.speed + " km/h";
    }
}

class Car extends Vehicle {
    constructor(brand, speed, fuelType) {
        super(brand, speed);
        this.fuelType = fuelType;
    }

    showCarDetails() {
        return "<div class='fuel'>Fuel Type: " + this.fuelType + "</div>";
    }
}

const car1 = new Car("Toyota", 180, "Petrol");
const car2 = new Car("Honda", 200, "Diesel");

const output = document.getElementById("output");

output.innerHTML =
    "<div class='card'>" +
        car1.displayInfo() + "<br>" + car1.showCarDetails() +
    "</div>" +

    "<div class='card'>" +
        car2.displayInfo() + "<br>" + car2.showCarDetails() +
    "</div>";
</script>

</body>
</html>
