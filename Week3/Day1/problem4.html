<!DOCTYPE html>
<html>
<head>
    <title>Interactive To-Do List</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        li {
            margin: 8px 0;
        }

        button {
            margin-left: 5px;
            padding: 4px 8px;
            cursor: pointer;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>

<h2>To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button id="addBtn">Add</button>

<h3>Total Tasks: <span id="totalCount">0</span></h3>
<h3>Completed Tasks: <span id="completedCount">0</span></h3>

<ul id="taskList"></ul>

<script>
$(document).ready(function(){

    function updateCounts() {
        let total = $("#taskList li").length;
        let completed = $("#taskList li.completed").length;

        $("#totalCount").text(total);
        $("#completedCount").text(completed);
    }

    $("#addBtn").click(function(){

        let taskText = $("#taskInput").val();

        if(taskText !== ""){
            let newTask = $("<li>" +
                taskText +
                " <button class='completeBtn'>Complete</button>" +
                " <button class='deleteBtn'>Delete</button>" +
                "</li>");

            $("#taskList").append(newTask);

            $("#taskInput").val("");
            updateCounts();

            newTask.find(".completeBtn").click(function(){
                $(this).parent().toggleClass("completed");
                updateCounts();
            });

            newTask.find(".deleteBtn").click(function(){
                $(this).parent().remove();
                updateCounts();
            });

        }
    });

});
</script>

</body>
</html>
