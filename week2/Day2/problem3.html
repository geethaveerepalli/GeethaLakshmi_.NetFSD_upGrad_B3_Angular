<!DOCTYPE html>
<html>
<head>
    <title>Employee Filter System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f6f8;
            padding: 30px;
        }

        select, button {
            padding: 8px;
            margin: 10px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
        }

        th, td {
            border: 1px solid gray;
            padding: 8px;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>

<body>

    <h2>Employee Management System</h2>

    <select id="jobSelect">
        <option value="All">All Employees</option>
        <option value="Manager">Manager</option>
        <option value="Salesman">Salesman</option>
        <option value="Clerk">Clerk</option>
    </select>

    <button onclick="showEmployees()">Show Emps</button>

    <br><br>

    <table id="empTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Job</th>
                <th>Salary</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

<script>

    const employees = [
        { id: 101, name: "Geetha", job: "Manager", salary: 60000 },
        { id: 102, name: "ayesha", job: "Salesman", salary: 30000 },
        { id: 103, name: "chandhu", job: "Clerk", salary: 25000 },
        { id: 104, name: "priya", job: "Manager", salary: 65000 },
        { id: 105, name: "pooji", job: "Salesman", salary: 32000 }
    ];

    function showEmployees() {

        const selectedJob = document.getElementById("jobSelect").value;
        const tbody = document.querySelector("#empTable tbody");
        tbody.innerHTML = "";
        let filteredEmployees;

        if (selectedJob === "All") {
            filteredEmployees = employees;
        } else {
            filteredEmployees = employees.filter(emp => emp.job === selectedJob);
        }
        filteredEmployees.forEach(emp => {
            const row = `
                <tr>
                    <td>${emp.id}</td>
                    <td>${emp.name}</td>
                    <td>${emp.job}</td>
                    <td>₹${emp.salary}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

</script>

</body>
</html>
