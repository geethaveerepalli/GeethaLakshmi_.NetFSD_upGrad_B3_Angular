<!DOCTYPE html>
<html>
<head>
    <title>Live Form Validation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-box {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .error {
            color: red;
            font-size: 13px;
        }

        .success {
            color: green;
            font-size: 13px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<div class="form-box">
    <h2>Registration Form</h2>

   <label>Name: </label> 
    <input type="text" id="name" onchange="validateName()">
    <div id="nameMsg"></div><br>

    <label>Email: </label>
    <input type="text" id="email" onchange="validateEmail()">
    <div id="emailMsg"></div><br>

   <label> Age:</label>
    <input type="number" id="age" min="18" max="80" onchange="validateAge()">
    <div id="ageMsg"></div><br>

    <button onclick="submitForm()">Register</button>
    <div id="finalMsg"></div>
</div>

<script>

function validateName() {
    let name = document.getElementById("name").value;

    if (name.trim() === "") {
        document.getElementById("nameMsg").innerHTML =
            "<span class='error'>Name cannot be empty</span>";
        return false;
    } else {
        document.getElementById("nameMsg").innerHTML =
            "<span class='success'>Valid Name</span>";
        return true;
    }
}

function validateEmail() {
    let email = document.getElementById("email").value;

    if (!email.includes("@")) {
        document.getElementById("emailMsg").innerHTML =
            "<span class='error'>Email must contain @</span>";
        return false;
    } else {
        document.getElementById("emailMsg").innerHTML =
            "<span class='success'>Valid Email</span>";
        return true;
    }
}

function validateAge() {
    let age = Number(document.getElementById("age").value);

    if (age >= 18 && age <= 80) {
        document.getElementById("ageMsg").innerHTML =
            "<span class='success'>Valid Age</span>";
        return true;
    } else {
        document.getElementById("ageMsg").innerHTML =
            "<span class='error'>Age must be between 18 and 80 only</span>";
        return false;
    }
}

function submitForm() {

    let isNameValid = validateName();
    let isEmailValid = validateEmail();
    let isAgeValid = validateAge();

    if (isNameValid && isEmailValid && isAgeValid) {

        let user = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            age: document.getElementById("age").value
        };

        sessionStorage.setItem("userData", JSON.stringify(user));

        document.getElementById("finalMsg").innerHTML =
            "<span class='success'>Registration Successful! Data stored in sessionStorage.</span>";
    } else {
        document.getElementById("finalMsg").innerHTML =
            "<span class='error'>Please fix errors before submitting.</span>";
    }
}

</script>

</body>
</html>
