<!DOCTYPE html>
<html>
<head>
    <title>Location Logger</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            width: 420px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result, .history {
            margin-top: 15px;
            font-size: 14px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>

<body onload="loadHistory()">

<div class="container">
    <h2>Location Logger</h2>

    <button onclick="getLocation()">Get My Location</button>

    <div class="result" id="locationResult"></div>

    <div class="history">
        <h4>Last 5 Locations:</h4>
        <ul id="historyList"></ul>
    </div>
</div>

<script>

function getLocation() {

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(
            showPosition,      
            showError,        
            { timeout: 10000 }
        );

    } else {
        document.getElementById("locationResult").innerHTML =
            "<span class='error'>Geolocation is not supported by this browser.</span>";
    }
}

function showPosition(position) {

    let latitude = position.coords.latitude;
    let longitude = position.coords.longitude;

    document.getElementById("locationResult").innerHTML =
        "<span class='success'>Latitude: " + latitude +
        "<br>Longitude: " + longitude + "</span>";

    let history = JSON.parse(localStorage.getItem("locationHistory")) || [];

    history.unshift({
        lat: latitude,
        lon: longitude,
        time: new Date().toLocaleString()
    });

    if (history.length > 5) {
        history = history.slice(0, 5);
    }

    localStorage.setItem("locationHistory", JSON.stringify(history));

    loadHistory();
}

function showError(error) {

    let message = "";

    switch(error.code) {
        case error.PERMISSION_DENIED:
            message = "Permission denied by user.";
            break;
        case error.POSITION_UNAVAILABLE:
            message = "Location information unavailable.";
            break;
        case error.TIMEOUT:
            message = "Request timed out.";
            break;
        default:
            message = "An unknown error occurred.";
    }

    document.getElementById("locationResult").innerHTML =
        "<span class='error'>" + message + "</span>";
}

function loadHistory() {

    let history = JSON.parse(localStorage.getItem("locationHistory")) || [];

    let list = document.getElementById("historyList");
    list.innerHTML = "";

    history.forEach(function(entry) {
        let li = document.createElement("li");
        li.innerHTML = 
            "Lat: " + entry.lat +
            ", Lon: " + entry.lon +
            "<br><small>" + entry.time + "</small>";
        list.appendChild(li);
    });
}

</script>

</body>
</html>
